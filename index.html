:root {
  --yellow:   #F5C518;
  --yellow-w: #FFD952;
  --blue-lt:  #4A7BF7;
  --surface:  #FFFFFF;
  --bg:       #F2F2F7;   /* iOS light grey page bg */
  --btn-bg:   #EFEFEF;   /* light grey circles like pic 2 */
  --text:     #1a1a2e;
  --muted:    #8892B0;
  --border:   #2a2a3e;   /* dark outline on video */
}

html, body {
  height: 100%;
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* White card — matches pic 2 */
.card {
  width: min(480px, 96vw);
  height: min(780px, 96vh);
  background: var(--surface);
  border-radius: 28px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.12);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Top bar — white, light grey circles ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px 12px;
  flex-shrink: 0;
  background: var(--surface);
  border-bottom: 1px solid #E5E5EA;
}
.icon-btn {
  width: 40px; height: 40px;
  background: var(--btn-bg);
  border: none; border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s, background 0.15s;
}
.icon-btn:hover { background: #E0E0E0; transform: scale(1.08); }
.icon-btn svg { width: 17px; height: 17px; color: #3C3C43; }

.topbar-centre {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
}
.tutor-name {
  font-size: 17px;
  font-weight: 800;
  color: var(--text);
  line-height: 1;
}
.tutor-sub {
  font-size: 11px;
  font-weight: 700;
  color: var(--blue-lt);
  letter-spacing: 0.07em;
  text-transform: uppercase;
}

/* ── Video — white inside, dark outline ── */
.video-wrap {
  padding: 14px 16px 0;
  flex-shrink: 0;
}

.video-card {
  border-radius: 20px;
  border: 2.5px solid var(--border);
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  overflow: hidden;
  position: relative;
  background: #FFFFFF;   /* white background = no black corners */
  line-height: 0;
}

.video-card video {
  width: 100%;
  height: auto;
  max-height: 300px;
  display: block;
  border-radius: 17px;
  object-fit: contain;
  object-position: center top;
  background: #FFFFFF;
  vertical-align: top;
}

.video-overlay {
  position: absolute; inset: 0; z-index: 3;
  display: flex; align-items: flex-end; justify-content: space-between;
  padding: 10px;
  pointer-events: none;
}
.v-icon {
  width: 30px; height: 30px;
  background: rgba(0,0,0,0.18);
  backdrop-filter: blur(6px);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  pointer-events: all; cursor: pointer;
}
.v-icon svg { width: 15px; height: 15px; color: #fff; }

/* ── Bubble — white, yellow border ── */
.bubble-wrap {
  padding: 14px 16px 0;
  flex-shrink: 0;
}

.bubble-card {
  border-radius: 18px;
  border: 2.5px solid var(--yellow);
  background: var(--surface);
  padding: 22px 24px;
  min-height: 80px;
  cursor: pointer;
  transition: transform 0.12s, box-shadow 0.12s;
  animation: popIn 0.2s cubic-bezier(0.34,1.56,0.64,1);
  position: relative;
  overflow: hidden;
}
.bubble-card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(245,197,24,0.22); }
.bubble-card:active { transform: scale(0.98); }

.bubble-card p {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.45;
}
.anna-spell {
  letter-spacing: 0.22em;
  font-weight: 800;
  color: #1A3DA8;
}

.typing-card {
  border-radius: 18px;
  border: 2.5px solid var(--yellow);
  background: var(--surface);
  padding: 24px;
  min-height: 80px;
  display: flex;
  align-items: center;
  gap: 8px;
  animation: popIn 0.2s ease;
}
.dot {
  width: 10px; height: 10px;
  background: var(--muted); border-radius: 50%;
  animation: bounce 0.8s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay: 0.12s; }
.dot:nth-child(3) { animation-delay: 0.24s; }

.spacer { flex: 1; }

@keyframes popIn {
  from { opacity: 0; transform: translateY(10px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes bounce {
  0%,80%,100% { transform: translateY(0); opacity: 0.35; }
  40%          { transform: translateY(-7px); opacity: 1; }
}

/* ── Bottom bar — white, yellow camera ── */
.bottom-bar {
  padding: 12px 16px 20px;
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
  background: var(--surface);
  border-top: 1px solid #E5E5EA;
}

.keyboard-btn {
  width: 50px; height: 50px;
  background: var(--btn-bg);
  border: none; border-radius: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: transform 0.15s, background 0.15s;
}
.keyboard-btn:hover { background: #E0E0E0; transform: scale(1.07); }
.keyboard-btn svg { width: 22px; height: 22px; color: #3C3C43; }

/* Solid yellow pill — matches pic 2 exactly */
.camera-btn {
  flex: 1; height: 52px;
  background: var(--yellow);
  border: none; border-radius: 30px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 800;
  color: var(--text);
  box-shadow: 0 3px 12px rgba(245,197,24,0.4);
  transition: transform 0.15s, box-shadow 0.15s;
}
.camera-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245,197,24,0.55); }
.camera-btn:active { transform: scale(0.97); }
.camera-btn.off {
  background: var(--btn-bg);
  color: var(--muted);
  box-shadow: none;
}
.camera-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
.on-dot {
  width: 9px; height: 9px;
  background: #22C55E; border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 6px rgba(34,197,94,0.7);
}

    <button class="icon-btn">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
      </svg>
    </button>
  </div>

  <!-- Video -->

  <div class="video-wrap">
    <div class="video-card">
      <video
        src="https://raw.githubusercontent.com/borislava185-crypto/Ooshui/main/copy_4F416937-E49E-4841-80DA-EBE71335C05F.mov"
        autoplay loop muted playsinline
      ></video>
      <div class="video-overlay">
        <div class="v-icon">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15"/>

      </svg>
      <span id="camLabel">Camera On</span>
      <div class="on-dot" id="onDot"></div>
    </button>
  </div>

</div>

<script>
  const messages = [
    `Hi, my name is... 👋`,
    `<span class="anna-spell">A &nbsp;N &nbsp;N &nbsp;A</span>. Anna.`,
    `I will be your tutor. 🤟`,
    `Let's start with a simple question...`,
    `<strong>How are you? How are you?</strong>`,
    `You could sign... <strong>I'm good</strong> 😊`,
  ];

  let step = 0;
  let busy = false;

  function nextBubble() {
    if (busy) return;
    busy = true;
    const wrap = document.getElementById('bubbleWrap');
    const old = document.getElementById('bubble');
    if (old) old.remove();

    const typing = document.createElement('div');
    typing.className = 'typing-card';
    typing.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    wrap.appendChild(typing);

    setTimeout(() => {
      typing.remove();
      step = (step + 1) % messages.length;
      const nb = document.createElement('div');
      nb.className = 'bubble-card';
      nb.id = 'bubble';
      nb.onclick = nextBubble;
      nb.innerHTML = `<p>${messages[step]}</p>`;
      wrap.appendChild(nb);
      busy = false;
    }, 150);
  }

  let camOn = true;
  function toggleCamera() {
    camOn = !camOn;
    document.getElementById('cameraBtn').classList.toggle('off', !camOn);
    document.getElementById('camLabel').textContent = camOn ? 'Camera On' : 'Camera Off';
    document.getElementById('onDot').style.display = camOn ? 'block' : 'none';
  }

  let muted = true;
  function toggleMute() {
    muted = !muted;
    document.querySelector('video').muted = muted;
  }
</script>
