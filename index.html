:root {
  --blue:        #1A3DA8;
  --blue-mid:    #2356D6;
  --blue-light:  #4A7BF7;
  --yellow:      #F5C518;
  --yellow-warm: #FFD952;
  --bg:          #F0F4FF;
  --surface:     #FFFFFF;
  --text:        #1a1a2e;
  --muted:       #8892B0;
}

html, body {
  height: 100%;
  font-family: 'Nunito', sans-serif;
  background: #c8d3ee;
  display: flex;
  align-items: center;
  justify-content: center;
}

.phone {
  width: 390px;
  height: 844px;
  background: var(--bg);
  border-radius: 48px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow:
    0 30px 80px rgba(26,61,168,0.3),
    0 0 0 10px #1a1a2e,
    0 0 0 12px #2a2a3e;
  position: relative;
}

/* Status bar */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 28px 4px;
  font-size: 13px;
  font-weight: 800;
  color: var(--text);
  flex-shrink: 0;
}
.status-icons { display: flex; gap: 5px; align-items: center; }
.status-icons svg { width: 16px; height: 16px; }

/* Top bar */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 20px 10px;
  flex-shrink: 0;
}
.icon-btn {
  width: 40px; height: 40px;
  background: var(--surface);
  border: none; border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 10px rgba(26,61,168,0.12);
  transition: transform 0.15s;
}
.icon-btn:hover { transform: scale(1.08); }
.icon-btn svg { width: 18px; height: 18px; color: var(--text); }
.tutor-name {
  font-size: 17px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.3px;
}

/* Video box — square */
.video-wrap {
  padding: 0 18px;
  flex-shrink: 0;
}
.video-box {
  width: 100%;
  aspect-ratio: 1 / 1;
  background: linear-gradient(145deg, #b8c8f0, #cdd9f8);
  border-radius: 26px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 6px 28px rgba(26,61,168,0.16), inset 0 1px 0 rgba(255,255,255,0.5);
}
/* Blue-yellow top accent */
.video-box::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, var(--yellow), var(--blue-light), var(--yellow));
  z-index: 2;
}
.video-overlay {
  position: absolute; inset: 0; z-index: 3;
  display: flex; align-items: flex-end; justify-content: space-between;
  padding: 12px;
}
.v-icon {
  width: 30px; height: 30px;
  background: rgba(255,255,255,0.28);
  backdrop-filter: blur(6px);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
}
.v-icon svg { width: 15px; height: 15px; color: #fff; }

/* Scroll area for bubbles */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 14px 18px 6px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  scrollbar-width: none;
}
.chat-area::-webkit-scrollbar { display: none; }

/* Bubble */
.bubble {
  background: var(--surface);
  border-radius: 20px 20px 20px 5px;
  padding: 18px 18px 14px;
  max-width: 86%;
  min-height: 72px;
  box-shadow: 0 2px 14px rgba(26,61,168,0.07);
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  animation: popIn 0.32s cubic-bezier(0.34,1.56,0.64,1);
  position: relative;
  overflow: hidden;
}
.bubble:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(26,61,168,0.13); }
.bubble:active { transform: scale(0.97); }

/* Empty grey shimmer */
.bubble.empty {
  background: linear-gradient(135deg, #e2e8f8, #d8e0f5);
}
.bubble.empty::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.55) 50%, transparent 100%);
  background-size: 200% 100%;
  animation: shimmer 1.8s ease-in-out infinite;
}

@keyframes popIn {
  from { opacity: 0; transform: translateY(16px) scale(0.95); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes shimmer {
  0%   { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

/* Typing dots */
.typing-bubble {
  background: var(--surface);
  border-radius: 20px 20px 20px 5px;
  padding: 18px 20px;
  display: inline-flex;
  gap: 7px;
  align-items: center;
  box-shadow: 0 2px 14px rgba(26,61,168,0.07);
  animation: popIn 0.28s ease;
}
.dot {
  width: 9px; height: 9px;
  background: var(--muted);
  border-radius: 50%;
  animation: bounce 1.2s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay: 0.18s; }
.dot:nth-child(3) { animation-delay: 0.36s; }
@keyframes bounce {
  0%,80%,100% { transform: translateY(0); opacity: 0.35; }
  40%          { transform: translateY(-7px); opacity: 1; }
}

.tap-hint {
  text-align: center;
  font-size: 11px;
  color: var(--muted);
  padding: 4px 0 6px;
  flex-shrink: 0;
  letter-spacing: 0.02em;
}

/* Bottom bar */
.bottom-bar {
  padding: 8px 22px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.keyboard-btn {
  width: 52px; height: 52px;
  background: var(--surface);
  border: none; border-radius: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 10px rgba(26,61,168,0.1);
  flex-shrink: 0;
  transition: transform 0.15s;
}
.keyboard-btn:hover { transform: scale(1.07); }
.keyboard-btn svg { width: 22px; height: 22px; color: var(--muted); }

/* Camera FAB */
.camera-fab {
  flex: 1;
  height: 58px;
  background: linear-gradient(135deg, var(--yellow), var(--yellow-warm));
  border: none; border-radius: 30px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 9px;
  box-shadow: 0 5px 22px rgba(245,197,24,0.48);
  font-family: 'Nunito', sans-serif;
  font-size: 15px; font-weight: 800;
  color: var(--blue);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; overflow: hidden;
}
.camera-fab::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.28), transparent);
}
.camera-fab:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(245,197,24,0.6); }
.camera-fab:active { transform: scale(0.97); }
.camera-fab svg { width: 23px; height: 23px; color: var(--blue); flex-shrink: 0; }

.home-indicator {
  width: 130px; height: 5px;
  background: var(--text);
  border-radius: 3px;
  margin: 0 auto 10px;
  opacity: 0.13;
  flex-shrink: 0;
}

<script>
  const chatArea = document.getElementById('chatArea');
  let busy = false;

  function cycleBubble() {
    if (busy) return;
    busy = true;

    // Clear and show typing dots
    chatArea.innerHTML = '';
    const typing = document.createElement('div');
    typing.className = 'typing-bubble';
    typing.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    chatArea.appendChild(typing);

    // After 1.2s replace with fresh empty bubble
    setTimeout(() => {
      chatArea.innerHTML = '';
      const newBubble = document.createElement('div');
      newBubble.className = 'bubble empty';
      newBubble.onclick = cycleBubble;
      chatArea.appendChild(newBubble);
      busy = false;
    }, 1200);
  }
</script>
